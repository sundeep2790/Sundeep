name: Build Windows EXE Installer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Windows Engine Binaries
      run: |
        python download_binaries.py

    - name: Generate App Icons
      run: |
        python generate_icons.py

    - name: Build Windows App & EXE Package
      run: |
        python build/build_win.py

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DataRescue_Windows_Installer
        path: build/installer/DataRescue_Setup_1.0.0.exe
        if-no-files-found: error
